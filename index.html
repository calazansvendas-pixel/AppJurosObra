<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Juros de Obra - Morar</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel para compilar JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Pequenos ajustes para garantir carregamento limpo */
        body { margin: 0; padding: 0; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // ÍCONES (Substitutos em SVG para o Lucide React)
        // ==========================================
        const Icon = ({ size = 24, className = "", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const HardHat = (p) => <Icon {...p}><path d="M2 18a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v2z"/><path d="M10 10V5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v5"/><path d="M4 15v-3a6 6 0 0 1 6-6h0"/><path d="M14 6h0a6 6 0 0 1 6 6v3"/></Icon>;
        const FileText = (p) => <Icon {...p}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></Icon>;
        const TrendingUp = (p) => <Icon {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></Icon>;
        const Calculator = (p) => <Icon {...p}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></Icon>;
        const RefreshCw = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>;
        const Info = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Icon>;
        const CheckCircle2 = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>;

        // ==========================================
        // APLICAÇÃO PRINCIPAL
        // ==========================================
        function App() {
            const [financiamento, setFinanciamento] = useState('');
            const [taxaAnual, setTaxaAnual] = useState('');
            const [percTerreno, setPercTerreno] = useState('');
            const [percObra, setPercObra] = useState('');
            const [parcelaFutura, setParcelaFutura] = useState('');
            const [seguro, setSeguro] = useState('');
            
            const [tr, setTr] = useState(0);
            const [trData, setTrData] = useState('Buscando...');
            const [isFetchingTr, setIsFetchingTr] = useState(true);

            const TAXA_ADM = 25.00;

            useEffect(() => {
                fetchTR();
            }, []);

            const fetchTR = async () => {
                setIsFetchingTr(true);
                try {
                const response = await fetch('https://api.bcb.gov.br/dados/serie/bcdata.sgs.226/dados/ultimos/1?formato=json');
                const data = await response.json();
                if (data && data.length > 0) {
                    setTr(parseFloat(data[0].valor));
                    setTrData(data[0].data);
                }
                } catch (error) {
                console.error('Erro ao buscar TR:', error);
                setTr(0.10);
                setTrData('Falha na API');
                } finally {
                setIsFetchingTr(false);
                }
            };

            const handleReset = () => {
                setFinanciamento('');
                setTaxaAnual('');
                setPercTerreno('');
                setPercObra('');
                setParcelaFutura('');
                setSeguro('');
                fetchTR();
            };

            const formatCurrency = (value) => {
                return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
            };
            
            const formatPercent = (value, decimals = 2) => {
                return `${parseFloat(value).toFixed(decimals)}%`;
            };

            const percTotalLiberado = parseFloat(percTerreno || 0) + parseFloat(percObra || 0);
            const saldoLiberado = parseFloat(financiamento || 0) * (percTotalLiberado / 100);
            
            const taxaMensal = parseFloat(taxaAnual || 0) / 12;
            const valorJuros = saldoLiberado * (taxaMensal / 100);
            const valorTr = saldoLiberado * (parseFloat(tr || 0) / 100);
            
            const totalParcela = valorJuros + valorTr + parseFloat(seguro || 0) + TAXA_ADM;
            const tetoAlcancado = parcelaFutura > 0 ? (totalParcela / parcelaFutura) * 100 : 0;

            return (
                <div className="min-h-screen p-4 md:p-8 font-sans text-slate-800">
                <div className="max-w-6xl mx-auto mb-8">
                    <div className="flex items-center gap-3 mb-2">
                    <div className="bg-[#1D8843] p-2 rounded-lg text-white shadow-sm">
                        <HardHat size={28} />
                    </div>
                    <h1 className="text-3xl font-bold text-[#05532C]">Simulador de Juros de Obra</h1>
                    </div>
                    <p className="text-slate-600 text-lg">Entenda centavo por centavo como a Caixa calcula a sua parcela de evolução de obra no modelo Apoio à Produção.</p>
                </div>

                <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
                    <div className="lg:col-span-5 space-y-6">
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 border-t-4 border-t-[#662B7F]">
                        <h2 className="text-xl font-bold flex items-center gap-2 mb-6 text-[#05532C]">
                        <FileText className="text-[#662B7F]" /> Dados do seu Contrato
                        </h2>
                        <div className="space-y-5">
                        <div>
                            <label className="block text-sm font-semibold text-slate-700 mb-1">Valor do Financiamento (R$)</label>
                            <input type="number" value={financiamento} onChange={(e) => setFinanciamento(e.target.value)} className="w-full pl-4 pr-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#1D8843] focus:border-[#1D8843] outline-none font-semibold text-slate-800" />
                        </div>
                        <div>
                            <label className="block text-sm font-semibold text-slate-700 mb-1">Taxa de Juros Nominal (% ao ano)</label>
                            <input type="number" step="0.01" value={taxaAnual} onChange={(e) => setTaxaAnual(e.target.value)} className="w-full pl-4 pr-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#1D8843] focus:border-[#1D8843] outline-none font-semibold text-slate-800" />
                        </div>
                        <div>
                            <label className="block text-sm font-semibold text-slate-700 mb-1">Valor da Parcela de Amortização (R$)</label>
                            <input type="number" value={parcelaFutura} onChange={(e) => setParcelaFutura(e.target.value)} className="w-full pl-4 pr-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#1D8843] focus:border-[#1D8843] outline-none font-semibold text-slate-800" />
                        </div>
                        </div>
                    </div>
                    <button onClick={handleReset} className="w-full bg-white border-2 border-[#99247F] text-[#99247F] hover:bg-[#99247F] hover:text-white transition-all py-3 rounded-xl font-bold flex items-center justify-center gap-2 shadow-sm">
                        <RefreshCw size={20} /> Zerar Todos os Valores
                    </button>
                    </div>

                    <div className="lg:col-span-7 space-y-6">
                    <div className="bg-gradient-to-br from-[#05532C] to-[#1D8843] rounded-2xl shadow-lg p-8 text-white relative">
                        <div className="text-5xl font-extrabold mb-6 tracking-tight drop-shadow-sm">{formatCurrency(totalParcela)}</div>
                        <div className="space-y-2">
                            <div className="flex justify-between text-sm font-medium text-white/80">
                            <span>Proporção em relação à Parcela Futura</span>
                            <span>{formatPercent(tetoAlcancado, 1)} da parcela de financiamento</span>
                            </div>
                            <div className="h-2 w-full bg-[#05532C] rounded-full overflow-hidden border border-white/10">
                            <div className="h-full bg-[#72AC44] rounded-full" style={{ width: `${Math.min(tetoAlcancado, 100)}%` }}></div>
                            </div>
                            <p className="text-xs text-white/60">A cobrança do juro de obra geralmente não é limitada ao valor da sua prestação futura ({formatCurrency(parcelaFutura)}).</p>
                        </div>
                    </div>
                    </div>
                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
