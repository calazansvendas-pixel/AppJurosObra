<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Juros de Obra - Morar</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel para compilar JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Pequenos ajustes para garantir carregamento limpo */
        body { margin: 0; padding: 0; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // ÍCONES (Substitutos em SVG para o Lucide React)
        // ==========================================
        const Icon = ({ size = 24, className = "", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const HardHat = (p) => <Icon {...p}><path d="M2 18a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v2z"/><path d="M10 10V5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v5"/><path d="M4 15v-3a6 6 0 0 1 6-6h0"/><path d="M14 6h0a6 6 0 0 1 6 6v3"/></Icon>;
        const FileText = (p) => <Icon {...p}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></Icon>;
        const TrendingUp = (p) => <Icon {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></Icon>;
        const Calculator = (p) => <Icon {...p}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></Icon>;
        const RefreshCw = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>;
        const Info = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Icon>;
        const CheckCircle2 = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>;

        // ==========================================
        // APLICAÇÃO PRINCIPAL
        // ==========================================
        function App() {
            // Estados para os inputs do usuário iniciados vazios
            const [financiamento, setFinanciamento] = useState('');
            const [taxaAnual, setTaxaAnual] = useState('');
            const [percTerreno, setPercTerreno] = useState('');
            const [percObra, setPercObra] = useState('');
            const [parcelaFutura, setParcelaFutura] = useState('');
            const [seguro, setSeguro] = useState('');
            
            // Estados para a API do Banco Central (TR)
            const [tr, setTr] = useState(0);
            const [trData, setTrData] = useState('Buscando...');
            const [isFetchingTr, setIsFetchingTr] = useState(true);

            // Taxa de administração fixa conforme regra da CEF
            const TAXA_ADM = 25.00;

            // Busca a TR na API do Banco Central na inicialização
            useEffect(() => {
                fetchTR();
            }, []);

            const fetchTR = async () => {
                setIsFetchingTr(true);
                try {
                const response = await fetch('https://api.bcb.gov.br/dados/serie/bcdata.sgs.226/dados/ultimos/1?formato=json');
                const data = await response.json();
                if (data && data.length > 0) {
                    setTr(parseFloat(data[0].valor));
                    setTrData(data[0].data);
                }
                } catch (error) {
                console.error('Erro ao buscar TR:', error);
                setTr(0.10); // Valor fallback razoável
                setTrData('Falha na API (Usando fallback)');
                } finally {
                setIsFetchingTr(false);
                }
            };

            // Função para limpar todos os campos
            const handleReset = () => {
                setFinanciamento('');
                setTaxaAnual('');
                setPercTerreno('');
                setPercObra('');
                setParcelaFutura('');
                setSeguro('');
                fetchTR(); // Restaura a TR do dia
            };

            // Funções utilitárias de formatação
            const formatCurrency = (value) => {
                return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
            };
            
            const formatPercent = (value, decimals = 2) => {
                return `${parseFloat(value).toFixed(decimals)}%`;
            };

            // ==========================================
            // MOTOR DE CÁLCULO
            // ==========================================
            const percTotalLiberado = parseFloat(percTerreno || 0) + parseFloat(percObra || 0);
            const saldoLiberado = parseFloat(financiamento || 0) * (percTotalLiberado / 100);
            
            const taxaMensal = parseFloat(taxaAnual || 0) / 12;
            const valorJuros = saldoLiberado * (taxaMensal / 100);
            const valorTr = saldoLiberado * (parseFloat(tr || 0) / 100);
            
            const totalParcela = valorJuros + valorTr + parseFloat(seguro || 0) + TAXA_ADM;
            const tetoAlcancado = parcelaFutura > 0 ? (totalParcela / parcelaFutura) * 100 : 0;

            return (
                <div className="min-h-screen p-4 md:p-8 font-sans text-slate-800">
                
                {/* HEADER */}
                <div className="max-w-6xl mx-auto mb-8">
                    <div className="flex items-center gap-3 mb-2">
                    <div className="bg-[#1D8843] p-2 rounded-lg text-white shadow-sm">
                        <HardHat size={28} />
                    </div>
                    <h1 className="text-3xl font-bold text-[#05532C]">Simulador de Juros de Obra</h1>
                    </div>
                    <p className="text-slate-600 text-lg">Entenda centavo por centavo como a Caixa calcula a sua parcela de evolução de obra no modelo Apoio à Produção.</p>
                </div>

                <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
                    
                    {/* COLUNA ESQUERDA: INPUTS */}
                    <div className="lg:col-span-5 space-y-6">
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 border-t-4 border-t-[#662B7F]">
                        <h2 className="text-xl font-bold flex items-center gap-2 mb-6 text-[#05532C]">
                        <FileText className="text-[#662B7F]" /> 
                        Dados do seu Contrato
                        </h2>
                        
                        <div className="space-y-5">
                        {/* Financiamento */}
                        <div>
                            <label className="block text-sm font-semibold text-slate-700 mb-1">Valor do Financiamento (R$)</label>
                            <div className="relative">
                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-medium">R$</span>
                            <input 
                                type="number" 
                                value={financiamento} 
                                onChange={(e) => setFinanciamento(e.target.value)}
                                className="w-full pl-10 pr-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#1D8843] focus:border-[#1D8843] outline-none transition-all font-semibold text-slate-800"
                            />
                            </div>
                            <p className="text-xs text-slate-500 mt-1">O valor total que você financiou com o banco.</p>
                        </div>

                        {/* Taxa de Juros Anual */}
                        <div>
                            <label className="block text-sm font-semibold text-slate-700 mb-1">Taxa de Juros Nominal (% ao ano)</label>
                            <div className="relative">
                            <input 
                                type="number" 
                                step="0.01"
                                value={taxaAnual} 
                                onChange={(e) => setTaxaAnual(e.target.value)}
                                className="w-full pl-4 pr-10 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#1D8843] focus:border-[#1D8843] outline-none transition-all font-semibold text-slate-800"
                            />
                            <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">%</span>
                            </div>
                        </div>

                        {/* Parcela Futura */}
                        <div>
                            <label className="block text-sm font-semibold text-slate-700 mb-1">Valor da Parcela de Amortização (R$)</label>
                            <div className="relative">
                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-medium">R$</span>
                            <input 
                                type="number" 
                                value={parcelaFutura} 
                                onChange={(e) => setParcelaFutura(e.target.value)}
                                className="w-full pl-10 pr-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#1D8843] focus:border-[#1D8843] outline-none transition-all font-semibold text-slate-800"
                            />
                            </div>
                            <p className="text-xs text-slate-500 mt-1">Usaremos para comparar se o juro está chegando no teto.</p>
                        </div>

                        <div className="grid grid-cols-2 gap-4 pt-2">
                            {/* Seguros */}
                            <div>
                            <label className="block text-sm font-semibold text-slate-700 mb-1">Seguros (MIP/DFI)</label>
                            <div className="relative">
                                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">R$</span>
                                <input 
                                type="number" 
                                step="0.01"
                                value={seguro} 
                                onChange={(e) => setSeguro(e.target.value)}
                                className="w-full pl-9 pr-3 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#1D8843] focus:border-[#1D8843] outline-none transition-all font-semibold"
                                />
                            </div>
                            </div>
                            {/* Taxa Adm */}
                            <div>
                            <label className="block text-sm font-semibold text-slate-700 mb-1">Taxa Adm. CEF</label>
                            <div className="w-full px-3 py-2.5 rounded-lg border border-slate-200 bg-slate-100 font-semibold text-slate-500 flex items-center cursor-not-allowed">
                                R$ {TAXA_ADM.toFixed(2)}
                            </div>
                            </div>
                        </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 border-t-4 border-t-[#72AC44]">
                        <h2 className="text-xl font-bold flex items-center gap-2 mb-6 text-[#05532C]">
                        <TrendingUp className="text-[#72AC44]" /> 
                        Evolução da Obra (Medição)
                        </h2>
                        
                        <div className="space-y-5">
                        {/* Percentual Terreno */}
                        <div>
                            <label className="block text-sm font-semibold text-slate-700 mb-1">Percentual do Terreno (%)</label>
                            <div className="relative">
                            <input 
                                type="number" 
                                step="0.1"
                                value={percTerreno} 
                                onChange={(e) => setPercTerreno(e.target.value)}
                                className="w-full pl-4 pr-10 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#72AC44] focus:border-[#72AC44] outline-none transition-all font-semibold"
                            />
                            <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">%</span>
                            </div>
                            <p className="text-xs text-slate-500 mt-1">Fração liberada no início (geralmente entre 5% e 15%).</p>
                        </div>

                        {/* Percentual Obra */}
                        <div>
                            <label className="block text-sm font-semibold text-slate-700 mb-1">Obra Executada (%)</label>
                            <div className="relative">
                            <input 
                                type="number" 
                                step="0.1"
                                value={percObra} 
                                onChange={(e) => setPercObra(e.target.value)}
                                className="w-full pl-4 pr-10 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#72AC44] focus:border-[#72AC44] outline-none transition-all font-semibold"
                            />
                            <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">%</span>
                            </div>
                            <p className="text-xs text-slate-500 mt-1">Medição atestada pela engenharia da Caixa este mês.</p>
                        </div>
                        </div>
                    </div>

                    {/* Botão de Limpar Dados */}
                    <button 
                        onClick={handleReset}
                        className="w-full bg-white border-2 border-[#99247F] text-[#99247F] hover:bg-[#99247F] hover:text-white transition-all py-3 rounded-xl font-bold flex items-center justify-center gap-2 shadow-sm"
                    >
                        <RefreshCw size={20} className={""} />
                        Zerar Todos os Valores
                    </button>
                    </div>

                    {/* COLUNA DIREITA: RESULTADOS E MEMÓRIA DE CÁLCULO */}
                    <div className="lg:col-span-7 space-y-6">
                    
                    {/* CARD DE RESULTADO PRINCIPAL */}
                    <div className="bg-gradient-to-br from-[#05532C] to-[#1D8843] rounded-2xl shadow-lg p-8 text-white relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-32 bg-white opacity-5 rounded-full blur-3xl transform translate-x-1/3 -translate-y-1/3"></div>
                        <div className="absolute bottom-0 left-0 p-24 bg-[#72AC44] opacity-20 rounded-full blur-3xl transform -translate-x-1/3 translate-y-1/3"></div>
                        
                        <div className="relative z-10">
                        <div className="flex items-center justify-between mb-4">
                            <span className="text-[#72AC44] font-bold uppercase tracking-wider text-sm flex items-center gap-2">
                            <Calculator size={16} /> Valor da Parcela (Juro de Obra)
                            </span>
                            
                            {/* TR Badge */}
                            <div className="bg-white/10 backdrop-blur border border-white/20 rounded-full px-3 py-1 flex items-center gap-2 text-xs">
                            <RefreshCw size={12} className={isFetchingTr ? "animate-spin text-white" : "text-[#72AC44]"} />
                            <span>TR: {isFetchingTr ? '...' : formatPercent(tr, 4)} ({trData})</span>
                            </div>
                        </div>

                        <div className="text-5xl font-extrabold mb-6 tracking-tight drop-shadow-sm">
                            {formatCurrency(totalParcela)}
                        </div>

                        {/* Progress Bar do Teto */}
                        <div className="space-y-2">
                            <div className="flex justify-between text-sm font-medium text-white/80">
                            <span>Proporção em relação à Parcela Futura</span>
                            <span>{formatPercent(tetoAlcancado, 1)} da parcela de financiamento</span>
                            </div>
                            <div className="h-2 w-full bg-[#05532C] rounded-full overflow-hidden border border-white/10">
                            <div 
                                className={`h-full rounded-full transition-all duration-500 ${tetoAlcancado > 90 ? 'bg-[#99247F]' : tetoAlcancado > 70 ? 'bg-[#662B7F]' : 'bg-[#72AC44]'}`}
                                style={{ width: `${Math.min(tetoAlcancado, 100)}%` }}
                            ></div>
                            </div>
                            <p className="text-xs text-white/60">
                            A cobrança do juro de obra geralmente não é limitada ao valor da sua prestação futura ({formatCurrency(parcelaFutura)}).
                            </p>
                        </div>
                        </div>
                    </div>

                    {/* MEMÓRIA DE CÁLCULO */}
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                        <h3 className="text-lg font-bold text-[#05532C] mb-4 flex items-center gap-2">
                        <Info className="text-[#1D8843]" /> 
                        Memória de Cálculo (Passo a Passo)
                        </h3>
                        
                        <div className="space-y-4">
                        
                        {/* Passo A */}
                        <div className="p-4 rounded-xl border border-slate-100 bg-slate-50">
                            <div className="flex items-start gap-3">
                            <div className="bg-[#1D8843]/10 text-[#1D8843] font-bold rounded-lg w-8 h-8 flex items-center justify-center shrink-0">A</div>
                            <div>
                                <h4 className="font-semibold text-[#05532C]">Cálculo do Saldo Liberado</h4>
                                <p className="text-sm text-slate-600 mt-1">A Caixa soma o terreno com a obra executada para saber quanto já te emprestou.</p>
                                <div className="mt-2 font-mono text-sm bg-white p-3 rounded border border-slate-200 text-slate-700 overflow-x-auto">
                                <span className="text-slate-400">Total % =</span> {formatPercent(percTerreno)} + {formatPercent(percObra)} = <b>{formatPercent(percTotalLiberado)}</b><br/>
                                <span className="text-slate-400">Saldo =</span> {formatCurrency(financiamento)} × {formatPercent(percTotalLiberado)}<br/>
                                <span className="text-[#1D8843] font-semibold">= {formatCurrency(saldoLiberado)}</span>
                                </div>
                            </div>
                            </div>
                        </div>

                        {/* Passo B */}
                        <div className="p-4 rounded-xl border border-slate-100 bg-slate-50">
                            <div className="flex items-start gap-3">
                            <div className="bg-[#1D8843]/10 text-[#1D8843] font-bold rounded-lg w-8 h-8 flex items-center justify-center shrink-0">B</div>
                            <div>
                                <h4 className="font-semibold text-[#05532C]">Taxa de Juros Mensal</h4>
                                <p className="text-sm text-slate-600 mt-1">Sua taxa anual ({formatPercent(taxaAnual)}) é dividida proporcionalmente para o mês.</p>
                                <div className="mt-2 font-mono text-sm bg-white p-3 rounded border border-slate-200 text-slate-700 overflow-x-auto">
                                <span className="text-slate-400">Taxa do Mês =</span> {formatPercent(taxaAnual)} ÷ 12 <br/>
                                <span className="text-[#1D8843] font-semibold">= {formatPercent(taxaMensal, 4)} ao mês</span>
                                </div>
                            </div>
                            </div>
                        </div>

                        {/* Passo C */}
                        <div className="p-4 rounded-xl border border-slate-100 bg-slate-50">
                            <div className="flex items-start gap-3">
                            <div className="bg-[#1D8843]/10 text-[#1D8843] font-bold rounded-lg w-8 h-8 flex items-center justify-center shrink-0">C</div>
                            <div>
                                <h4 className="font-semibold text-[#05532C]">Juros sobre o Saldo</h4>
                                <p className="text-sm text-slate-600 mt-1">Aplica-se a taxa mensal sobre o dinheiro que a Caixa já repassou.</p>
                                <div className="mt-2 font-mono text-sm bg-white p-3 rounded border border-slate-200 text-slate-700 overflow-x-auto">
                                <span className="text-slate-400">Juros =</span> {formatCurrency(saldoLiberado)} × {formatPercent(taxaMensal, 4)}<br/>
                                <span className="text-[#1D8843] font-semibold">= {formatCurrency(valorJuros)}</span>
                                </div>
                            </div>
                            </div>
                        </div>

                        {/* Passo D */}
                        <div className="p-4 rounded-xl border border-slate-100 bg-slate-50">
                            <div className="flex items-start gap-3">
                            <div className="bg-[#1D8843]/10 text-[#1D8843] font-bold rounded-lg w-8 h-8 flex items-center justify-center shrink-0">D</div>
                            <div className="w-full">
                                <h4 className="font-semibold text-[#05532C]">Correção pela TR</h4>
                                <p className="text-sm text-slate-600 mt-1">
                                O saldo devedor também sofre pequena atualização monetária. 
                                <span className="block mt-1 text-xs text-[#99247F]">
                                    * O app buscou a última TR diária. Caso queira usar outra, edite abaixo:
                                </span>
                                </p>
                                <div className="mt-2 flex flex-wrap gap-2 items-center">
                                <div className="relative w-32">
                                    <input 
                                    type="number" 
                                    step="0.0001"
                                    value={tr} 
                                    onChange={(e) => setTr(e.target.value)}
                                    className="w-full pl-3 pr-8 py-1.5 text-sm rounded border border-slate-300 focus:ring-1 focus:ring-[#1D8843] font-mono"
                                    />
                                    <span className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">%</span>
                                </div>
                                
                                <button 
                                    onClick={fetchTR}
                                    disabled={isFetchingTr}
                                    className="px-3 py-1.5 bg-[#1D8843]/10 text-[#1D8843] hover:bg-[#1D8843]/20 transition-colors rounded text-sm font-semibold flex items-center gap-2 disabled:opacity-50"
                                >
                                    <RefreshCw size={14} className={isFetchingTr ? "animate-spin" : ""} />
                                    Atualizar TR da Web
                                </button>
                                </div>
                                <div className="mt-2 font-mono text-sm bg-white p-3 rounded border border-slate-200 text-slate-700 overflow-x-auto">
                                <span className="text-slate-400">TR =</span> {formatCurrency(saldoLiberado)} × {formatPercent(tr, 4)}<br/>
                                <span className="text-[#1D8843] font-semibold">= {formatCurrency(valorTr)}</span>
                                </div>
                            </div>
                            </div>
                        </div>

                        {/* Conclusão */}
                        <div className="p-4 rounded-xl bg-[#05532C] text-white shadow-inner mt-6 border border-[#1D8843]/30">
                            <h4 className="font-semibold flex items-center gap-2 mb-3 text-[#72AC44]">
                            <CheckCircle2 size={18} /> 
                            Composição Final da Parcela
                            </h4>
                            <ul className="space-y-2 text-sm text-slate-200 font-mono pl-7">
                            <li className="flex justify-between"><span>Juros Calculados (C):</span> <span>{formatCurrency(valorJuros)}</span></li>
                            <li className="flex justify-between"><span>Correção TR (D):</span> <span>{formatCurrency(valorTr)}</span></li>
                            <li className="flex justify-between"><span>Seguros (MIP/DFI):</span> <span>{formatCurrency(seguro)}</span></li>
                            <li className="flex justify-between"><span>Taxa de Administração:</span> <span>{formatCurrency(TAXA_ADM)}</span></li>
                            <li className="border-t border-[#1D8843] my-2 pt-2 flex justify-between text-white font-bold text-base">
                                <span>Total a Pagar (TEO):</span> <span>{formatCurrency(totalParcela)}</span>
                            </li>
                            </ul>
                        </div>

                        </div>
                    </div>

                    </div>
                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
